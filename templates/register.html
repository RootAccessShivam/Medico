{% extends 'base.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card p-4 shadow-lg" style="width: 400px; border-radius: 15px;">
        
        <h3 class="text-center mb-4 fw-bold">Create Account</h3>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}

            <!-- Username -->
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
                <label>Username</label>
            </div>

            <!-- Password -->
            <div class="mb-3 position-relative">
                <div class="form-floating">
                    <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                    <label>Password</label>
                </div>
                <span onclick="togglePassword('password')" 
                      style="position:absolute; right:15px; top:50%; cursor:pointer;">👁</span>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3 position-relative">
                <div class="form-floating">
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
                    <label>Confirm Password</label>
                </div>
                <span onclick="togglePassword('confirm_password')" 
                      style="position:absolute; right:15px; top:50%; cursor:pointer;">👁</span>
            </div>

            <button class="btn btn-success w-100 py-2">Register</button>
        </form>

        <p class="mt-3 text-center">
            Already have an account? <a href="/login/">Login</a>
        </p>

    </div>
</div>

<!-- JS -->
<script>
function togglePassword(id) {
    let field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}
</script>

{% endblock %}
